spring:
  datasource:
    # driver-class-name is intentionally omitted: it is inferred from the JDBC URL
    # by Spring Boot's DataSourceAutoConfiguration. The @DynamicPropertySource
    # in IntegrationTestBase overrides this URL to point at the real PostgreSQL
    # container, where the inferred driver (org.postgresql.Driver) is required.
    url: jdbc:postgresql://placeholder
  jpa:
    hibernate:
      ddl-auto: none

camel:
  springboot:
    main-run-controller: false

app:
  csc:
    service-url: http://localhost:${wiremock.server.port:8089}
  storage:
    endpoint: http://localhost:${minio.port:9001}
  outbox:
    relay:
      enabled: true

eureka:
  client:
    enabled: false
