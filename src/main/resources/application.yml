server:
  port: 8088

spring:
  application:
    name: transcript-signing
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transcript_signing_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

camel:
  springboot:
    name: transcript-signing-camel
    main-run-controller: true
  component:
    kafka:
      brokers: ${KAFKA_BROKERS:localhost:9092}

app:
  kafka:
    topics:
      saga-command-transcript-signing: saga.command.transcript-signing
      saga-compensation-transcript-signing: saga.compensation.transcript-signing
      saga-reply-transcript-signing: saga.reply.transcript-signing
      transcript-signed: transcript.signed
      document-archive: document.archive
      dlq: transcript.signing.dlq
  csc:
    service-url: ${CSC_SERVICE_URL:http://localhost:9000}
    oauth2:
      client-id: ${CSC_CLIENT_ID:transcript-signing-service}
      client-secret: ${CSC_CLIENT_SECRET:}
      token-url: ${CSC_TOKEN_URL:http://localhost:9000/oauth2/token}
    credential-id: ${CSC_CREDENTIAL_ID:default-credential}
    pin: ${CSC_PIN:}
    hash-algorithm-oid: ${CSC_HASH_ALGORITHM_OID:2.16.840.1.101.3.4.2.1}
    xades:
      signature-level: ${XADES_SIGNATURE_LEVEL:XAdES-BASELINE-B}
    pades:
      signature-level: ${PADES_SIGNATURE_LEVEL:PAdES-B-B}
  signing:
    max-retries: ${SIGNING_MAX_RETRIES:3}
    timeout-seconds: ${SIGNING_TIMEOUT_SECONDS:30}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9001}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket-name: ${S3_BUCKET_NAME:signed-transcripts}
    region: ${S3_REGION:us-east-1}
    path-style-access: ${S3_PATH_STYLE_ACCESS:true}
    presigned-url-ttl-minutes: ${S3_PRESIGNED_TTL_MINUTES:60}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      csc-authorization:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      csc-signature:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      csc-authorization:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
      csc-signature:
        max-attempts: 2
        wait-duration: 500ms

logging:
  level:
    root: INFO
    com.wpanther.transcript.signing: DEBUG
    org.apache.camel: INFO
    org.hibernate.SQL: DEBUG
